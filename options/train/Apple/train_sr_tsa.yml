# general settings
name: apple

model_type: TrainModel
num_gpu: 2  # set num_gpu: 0 for cpu mode
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: FdX6P
    type: SRDataset 
     
    dataroot: /data1/loujunyu2/Iphone/train_patchs_2
    
    filename_tmpl: '{}'
    io_backend:
      type: disk

    use_flip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8   #8    #16
    batch_size_per_gpu: 12
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: true

  val:
    name: FdX6P_val
    type: SRDataset 
    
    dataroot: /data0/home/loujunyu2/Iphone/test_pairs_2
    
    filename_tmpl: '{}'
    io_backend:
      type: disk
      # type: lmdb
      # type: txt

# network structures
network_g:
  type: LPENet
  ngf: 128
  depths: [4,4]
  num_heads: [4,4]
  window_size: 8
  use_checkpoint: True

path:
  root: checkpoint/
  pretrain_network_g: ~
  strict_load: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Muon
    lr: !!float 3e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  # scheduler:
  #   type: MultiStepLR
  #   milestones: [5000]
  #   gamma: 0.5
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [200000]
    restart_weights: [1]
    eta_min: !!float 4e-6  

  total_iter: 200000
  warmup_iter: -1  # no warm up

  # generator losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean
  pixel_color_opt:
    type: MSELoss
    loss_weight: 10
    reduction: mean
  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      #'conv5_4': 1  # before relu
      'conv1_1': 0.1
      'conv2_1': 0.1
      'conv3_1': 1.0
      'conv4_1': 1.0
      'conv5_1': 1.0
    vgg_type: vgg19
    use_input_norm: true
    range_norm: false
    perceptual_weight: 0.005
    style_weight: 1e-3
    criterion: l1
  ssim_opt:
    type: SSIMLoss
    loss_weight: 0.5

# validation settings
val:
  val_freq: 10000
  save_img: False
  visuals: [gt, output]
  # visuals: [lq, base, gt, output]

  metrics:
    psnr:
      type: psnr
    ssim:
      type: ssim
    lpips:                    
      type: lpips             

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: 10000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
